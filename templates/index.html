<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kheti Tech | Precision Agriculture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f4f7f1; 
            background-image: url("https://www.transparenttextures.com/patterns/leaf.png");
        }
        .farm-card {
            background: rgba(255, 255, 255, 0.95);
            border-top: 5px solid #3e5c36;
        }
        .btn-harvest {
            background-color: #5d7a32;
            transition: all 0.3s ease;
        }
        .btn-harvest:hover {
            background-color: #3e5c36;
            transform: translateY(-2px);
        }
        h1, h2 { font-family: 'Quicksand', sans-serif; }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex justify-end mb-4">
            <select id="langSwitch" onchange="switchLanguage()" class="p-2 border border-green-300 rounded-md bg-white text-sm font-bold text-green-800 outline-none cursor-pointer shadow-sm">
                <option value="en">English</option>
                <option value="hi">हिन्दी (Hindi)</option>
                <option value="kn">ಕನ್ನಡ (Kannada)</option>
            </select>
        </div>

        <header class="text-center mb-10">
            <div id="subHeader" class="inline-block bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full uppercase font-bold tracking-widest mb-2">Kheti Tech Intelligence</div>
            <h1 id="mainTitle" class="text-4xl font-bold text-green-900">Kheti Tech Portal</h1>
            <p id="mainDesc" class="text-green-700 mt-2">Empowering farmers with data-driven irrigation and crop insights.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <form id="farmForm" class="lg:col-span-2 farm-card p-8 rounded-xl shadow-xl">
                <h2 id="formTitle" class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <span class="mr-2">🚜</span> Data Entry
                </h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label id="lbl-moisture" class="block text-sm font-medium text-gray-600">Soil Moisture (%)</label>
                        <input type="number" id="moisture" step="0.01" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="0-100">
                    </div>
                    <div>
                        <label id="lbl-rainfall" class="block text-sm font-medium text-gray-600">Rainfall (mm)</label>
                        <input type="number" id="rainfall" step="0.01" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="e.g. 150">
                    </div>
                    <div>
                        <label id="lbl-temp" class="block text-sm font-medium text-gray-600">Temperature (°C)</label>
                        <input type="number" id="temp" step="0.01" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="e.g. 28">
                    </div>
                    <div>
                        <label id="lbl-wind" class="block text-sm font-medium text-gray-600">Wind Speed (km/h)</label>
                        <input type="number" id="wind" step="0.01" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="e.g. 12">
                    </div>
                    <div>
                        <label id="lbl-ph" class="block text-sm font-medium text-gray-600">Soil pH</label>
                        <input type="number" step="0.1" id="ph" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="0-14">
                    </div>
                    <div>
                        <label id="lbl-humidity" class="block text-sm font-medium text-gray-600">Humidity (%)</label>
                        <input type="number" id="humidity" step="0.01" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="0-100">
                    </div>
                    <div>
                        <label id="lbl-soil" class="block text-sm font-medium text-gray-600">Soil Type</label>
                        <select id="soilType" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none bg-white">
                            </select>
                    </div>
                    <div>
                        <label id="lbl-season" class="block text-sm font-medium text-gray-600">Season</label>
                        <select id="season" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none bg-white">
                            </select>
                    </div>
                    <div>
                        <label id="lbl-sun" class="block text-sm font-medium text-gray-600">Sunlight (hrs)</label>
                        <input type="number" id="sunlight" step="0.01" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="0-24">
                    </div>
                    <div>
                        <label id="lbl-region" class="block text-sm font-medium text-gray-600">Region</label>
                        <select id="region" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none bg-white">
                            </select>
                    </div>
                    <div class="md:col-span-2">
                        <label id="lbl-prev" class="block text-sm font-medium text-gray-600">Previous Irrigation (mm)</label>
                        <input type="number" id="prevIrrigation" step="0.01" class="w-full mt-1 p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-green-500 outline-none" placeholder="e.g. 45">
                    </div>
                </div>

                <button type="button" id="btn-submit" onclick="analyzeData()" class="w-full mt-8 btn-harvest text-white font-bold py-3 rounded-lg shadow-lg uppercase tracking-wider">
                    Generate Analysis
                </button>
            </form>

            <div class="flex flex-col gap-6">
                <div class="farm-card p-8 rounded-xl shadow-xl flex-1 border-t-orange-500">
                    <h2 id="resTitle" class="text-xl font-bold text-gray-800 mb-4 italic">Kheti Tech Insights</h2>
                    
                    <div class="mb-6">
                        <p id="lbl-res-crop" class="text-xs uppercase text-gray-500 font-bold tracking-widest">Recommended Crop</p>
                        <p id="cropOutput" class="text-3xl font-bold text-green-800 mt-1">---</p>
                    </div>

                    <div>
                        <p id="lbl-res-irr" class="text-xs uppercase text-gray-500 font-bold tracking-widest">Irrigation Need</p>
                        <p id="irrigationOutput" class="text-3xl font-bold text-blue-800 mt-1">---</p>
                    </div>
                    
                    <div class="mt-8 p-4 bg-green-50 rounded-lg border border-green-100">
                        <p class="text-sm text-green-800 leading-relaxed">
                            <strong id="lbl-status">Note:</strong> <span id="statusText">Please fill the form to see recommendations.</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                mainTitle: "Kheti Tech Portal",
                mainDesc: "Empowering farmers with data-driven insights.",
                subHeader: "Kheti Tech Intelligence",
                formTitle: "Data Entry",
                moisture: "Soil Moisture (%)",
                rainfall: "Rainfall (mm)",
                temp: "Temperature (°C)",
                wind: "Wind Speed (km/h)",
                ph: "Soil pH",
                humidity: "Humidity (%)",
                soil: "Soil Type",
                season: "Season",
                sun: "Sunlight (hrs)",
                region: "Region",
                prev: "Previous Irrigation (mm)",
                btn: "Generate Analysis",
                resTitle: "Kheti Tech Insights",
                resCrop: "Recommended Crop",
                resIrr: "Irrigation Need",
                status: "Status",
                wait: "Please fill the form to see recommendations.",
                soilOpts: ["Loamy", "Clay", "Sandy", "Silt", "Peaty"],
                seasonOpts: ["Rabi", "Kharif", "Zaid"],
                regionOpts: {North: "North", East: "East", West: "West", South: "South"}
            },
            hi: {
                mainTitle: "खेती टेक पोर्टल",
                mainDesc: "डेटा-संचालित अंतर्दृष्टि के साथ किसानों को सशक्त बनाना।",
                subHeader: "खेती टेक इंटेलिजेंस",
                formTitle: "डेटा प्रविष्टि",
                moisture: "मिट्टी की नमी (%)",
                rainfall: "वर्षा (मिमी)",
                temp: "तापमान (°C)",
                wind: "हवा की गति (किमी/घंटा)",
                ph: "मिट्टी का पीएच",
                humidity: "नमी (%)",
                soil: "मिट्टी का प्रकार",
                season: "मौसम",
                sun: "धूप (घंटे)",
                region: "क्षेत्र",
                prev: "पिछली सिंचाई (मिमी)",
                btn: "विश्लेषण करें",
                resTitle: "खेती टेक परिणाम",
                resCrop: "अनुशंसित फसल",
                resIrr: "सिंचाई की आवश्यकता",
                status: "स्थिति",
                wait: "सिफारिशें देखने के लिए फॉर्म भरें।",
                soilOpts: ["दोमट (Loamy)", "चिकनी (Clay)", "रेतीली (Sandy)", "सिल्ट (Silt)", "पीटी (Peaty)"],
                seasonOpts: ["रबी (Rabi)", "खरीफ (Kharif)", "जायद (Zaid)"],
                regionOpts: {North: "उत्तर", East: "पूर्व", West: "पश्चिम", South: "दक्षिण"}
            },
            kn: {
                mainTitle: "ಖೇತಿ ಟೆಕ್ ಪೋರ್ಟಲ್",
                mainDesc: "ದತ್ತಾಂಶ ಆಧಾರಿತ ಒಳನೋಟಗಳೊಂದಿಗೆ ರೈತರ ಸಬಲೀಕರಣ.",
                subHeader: "ಖೇತಿ ಟೆಕ್ ಇಂಟೆಲಿಜೆನ್ಸ್",
                formTitle: "ಮಾಹಿತಿ ನಮೂದು",
                moisture: "ಮಣ್ಣಿನ ತೇವಾಂಶ (%)",
                rainfall: "ಮಳೆ (ಮಿಮಿ)",
                temp: "ತಾಪಮಾನ (°C)",
                wind: "ಗಾಳಿಯ ವೇಗ (ಕಿಮೀ/ಗಂ)",
                ph: "ಮಣ್ಣಿನ pH",
                humidity: "ಆರ್ದ್ರತೆ (%)",
                soil: "ಮಣ್ಣಿನ ವಿಧ",
                season: "ಹಂಗಾಮು",
                sun: "ಸೂರ್ಯನ ಬೆಳಕು (ಗಂಟೆಗಳು)",
                region: "ಪ್ರದೇಶ",
                prev: "ಹಿಂದಿನ ನೀರಾವರಿ (ಮಿಮಿ)",
                btn: "ವಿಶ್ಲೇಷಣೆ ನಡೆಸಿ",
                resTitle: "ಖೇತಿ ಟೆಕ್ ಫಲಿತಾಂಶಗಳು",
                resCrop: "ಶಿಫಾರಸು ಮಾಡಿದ ಬೆಳೆ",
                resIrr: "ನೀರಾವರಿ ಅವಶ್ಯಕತೆ",
                status: "ಸ್ಥಿತಿ",
                wait: "ಶಿಫಾರಸುಗಳನ್ನು ನೋಡಲು ಫಾರ್ಮ್ ಭರ್ತಿ ಮಾಡಿ.",
                soilOpts: ["ಲೋಮಿ (Loamy)", "ಜಿಗುಟು ಮಣ್ಣು (Clay)", "ಮರಳು ಮಣ್ಣು (Sandy)", "ಸಿಲ್ಟ್ (Silt)", "ಪೀಟಿ (Peaty)"],
                seasonOpts: ["ರಬಿ (Rabi)", "ಖಾರಿಫ್ (Kharif)", "ಜೈದ್ (Zaid)"],
                regionOpts: {North: "ಉತ್ತರ", East: "ಪೂರ್ವ", West: "ಪಶ್ಚಿಮ", South: "ದಕ್ಷಿಣ"}
            }
        };

        function switchLanguage() {
            const lang = document.getElementById('langSwitch').value;
            const t = translations[lang];

            document.getElementById('mainTitle').innerText = t.mainTitle;
            document.getElementById('mainDesc').innerText = t.mainDesc;
            document.getElementById('subHeader').innerText = t.subHeader;
            document.getElementById('formTitle').innerHTML = `<span class="mr-2">🚜</span> ${t.formTitle}`;
            
            document.getElementById('lbl-moisture').innerText = t.moisture;
            document.getElementById('lbl-rainfall').innerText = t.rainfall;
            document.getElementById('lbl-temp').innerText = t.temp;
            document.getElementById('lbl-wind').innerText = t.wind;
            document.getElementById('lbl-ph').innerText = t.ph;
            document.getElementById('lbl-humidity').innerText = t.humidity;
            document.getElementById('lbl-soil').innerText = t.soil;
            document.getElementById('lbl-season').innerText = t.season;
            document.getElementById('lbl-sun').innerText = t.sun;
            document.getElementById('lbl-region').innerText = t.region;
            document.getElementById('lbl-prev').innerText = t.prev;
            document.getElementById('btn-submit').innerText = t.btn;
            
            document.getElementById('resTitle').innerText = t.resTitle;
            document.getElementById('lbl-res-crop').innerText = t.resCrop;
            document.getElementById('lbl-res-irr').innerText = t.resIrr;
            document.getElementById('lbl-status').innerText = t.status;
            document.getElementById('statusText').innerText = t.wait;

            // Update Dropdowns and keep internal values consistent for the model
            const soilValues = ["Loamy", "Clay", "Sandy", "Silt", "Peaty"];
            document.getElementById('soilType').innerHTML = t.soilOpts.map((o, i) => `<option value="${soilValues[i]}">${o}</option>`).join('');

            const seasonValues = ["Rabi", "Kharif", "Zaid"];
            document.getElementById('season').innerHTML = t.seasonOpts.map((o, i) => `<option value="${seasonValues[i]}">${o}</option>`).join('');

            document.getElementById('region').innerHTML = Object.entries(t.regionOpts).map(([val, text]) => `<option value="${val}">${text}</option>`).join('');
        }

        async function analyzeData() {
            const lang = document.getElementById('langSwitch').value;
            
            // Prepare data for Backend
            const formData = {
                moisture: document.getElementById('moisture').value,
                rainfall: document.getElementById('rainfall').value,
                temp: document.getElementById('temp').value,
                wind: document.getElementById('wind').value,
                ph: document.getElementById('ph').value,
                humidity: document.getElementById('humidity').value,
                soilType: document.getElementById('soilType').value,
                season: document.getElementById('season').value,
                sunlight: document.getElementById('sunlight').value,
                region: document.getElementById('region').value,
                prevIrrigation: document.getElementById('prevIrrigation').value
            };

            // Basic Validation
            if (!formData.moisture || !formData.temp) {
                alert("Please fill in the required fields.");
                return;
            }

            document.getElementById('statusText').innerText = lang === 'en' ? "Consulting Kheti AI..." : (lang === 'hi' ? "खेती AI से सलाह ले रहे हैं..." : "ಖೇತಿ AI ಜೊತೆ ಸಮಾಲೋಚಿಸಲಾಗುತ್ತಿದೆ...");

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                // Display Predictions
                document.getElementById('cropOutput').innerText = result.crop;
                document.getElementById('irrigationOutput').innerText = result.irrigation;
                document.getElementById('statusText').innerText = lang === 'en' ? "Analysis complete." : (lang === 'hi' ? "विश्लेषण पूरा हुआ।" : "ವಿಶ್ಲೇಷಣೆ ಪೂರ್ಣಗೊಂಡಿದೆ.");
                
                document.getElementById('cropOutput').classList.add('animate-bounce');
                setTimeout(() => document.getElementById('cropOutput').classList.remove('animate-bounce'), 1000);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('statusText').innerText = "Error connecting to server.";
            }
        }

        // Run on load
        window.onload = switchLanguage;
    </script>
</body>
</html>
